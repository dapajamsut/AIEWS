version: "3.9"

services:
  backend:
    build: .
    container_name: laravel_app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app

  frontend:
    build: ./frontend
    container_name: next_app
    ports:
      - "3000:3000"

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ews
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ews_db
    ports:
      - "5432:5432"
