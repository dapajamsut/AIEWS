services:
  backend:
    build: .
    container_name: laravel_app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: next_app
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ews
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ews_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:
