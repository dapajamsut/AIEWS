version: '3.8'

services:
  backend:
    build: ./backend
    container_name: laravel_app
    volumes:
      - ./backend:/var/www
    working_dir: /var/www
    expose:
      - "9000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: next_app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx_laravel
    ports:
      - "8001:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped

  kong:
    image: kong:latest
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
    volumes:
      - ./kong-gateway/kong.yml:/kong/declarative/kong.yml
    ports:
      - "8080:8000"
      - "8001:8001"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ews
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ews_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/database/dump:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  db_data:
