services:
  # ==========================================
  # Database (PostgreSQL)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: ews_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: makesens_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ews_network

  # ==========================================
  # MQTT Broker (Eclipse Mosquitto)
  # ==========================================
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: ews_mqtt_broker
    restart: unless-stopped
    ports:
      - "1883:1883" # Standar MQTT
      - "9001:9001" # WebSocket untuk Dashboard Next.js
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - ews_network

  # ==========================================
  # Laravel PHP-FPM Backend Application
  # ==========================================
  laravel_app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ews_laravel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=makesens_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=admin
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
    networks:
      - ews_network
    depends_on:
      - postgres
      - mqtt-broker

  # ==========================================
  # Nginx Web Server (for Laravel Backend)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: ews_nginx
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ews_network
    depends_on:
      - laravel_app

  # ==========================================
  # MQTT Listener (Laravel Background Task)
  # ==========================================
  mqtt_listener:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ews_mqtt_listener
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan mqtt:listen
    volumes:
      - ./backend:/var/www
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=makesens_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=admin
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
    networks:
      - ews_network
    depends_on:
      - postgres
      - mqtt-broker
      - laravel_app

  # ==========================================
  # API Gateway (Kong)
  # ==========================================
  kong:
    image: kong:3.6
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info
    ports:
      - "8080:8000"  # gateway publik (di-forward oleh Nginx host ke port 8080)
      - "8001:8001"  # admin API
    volumes:
      - ./kong-gateway/kong.yml:/kong/declarative/kong.yml
    restart: unless-stopped
    networks:
      - ews_network
    depends_on:
      - nginx

  # ==========================================
  # Frontend Application (Next.js)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://makesens.my.id
        - NEXT_PUBLIC_MQTT_URL=wss://makesens.my.id/mqtt
    container_name: ews_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - ews_network
    depends_on:
      - kong

volumes:
  mosquitto_data:
  mosquitto_log:
  postgres_data:

networks:
  ews_network:
    driver: bridge
