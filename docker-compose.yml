services:
  # ==========================================
  # Database (PostgreSQL)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: ews_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: makesens_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    # Port 5432 tidak di-expose ke host — akses hanya via internal Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ews_network
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # MQTT Broker (Eclipse Mosquitto)
  # ==========================================
  mqtt-broker:
    image: eclipse-mosquitto:2.0.18
    container_name: ews_mqtt_broker
    restart: unless-stopped
    ports:
      - "1883:1883" # Standar MQTT
      - "9001:9001" # WebSocket untuk Dashboard Next.js
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - ews_network
    security_opt:
      - no-new-privileges:true
  # ==========================================
  laravel_app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ews_laravel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=makesens_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=admin
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
      # MQTT_USERNAME dan MQTT_PASSWORD sudah di-pass via env_file: ./backend/.env
    networks:
      - ews_network
    depends_on:
      - postgres
      - mqtt-broker
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # Nginx Web Server (for Laravel Backend)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: ews_nginx
    restart: unless-stopped
    # ✅ Port 8002 TIDAK di-expose ke host — Nginx hanya boleh diakses
    # dari Kong via internal Docker network (http://nginx).
    # Expose port ini hanya untuk debugging lokal jika diperlukan.
    # ports:
    #   - "127.0.0.1:8002:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ews_network
    depends_on:
      - laravel_app
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # MQTT Listener (Laravel Background Task)
  # ==========================================
  mqtt_listener:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ews_mqtt_listener
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "php artisan config:clear && php artisan mqtt:listen"
    volumes:
      - ./backend:/var/www
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=makesens_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=admin
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
      # MQTT_USERNAME dan MQTT_PASSWORD sudah di-pass via env_file: ./backend/.env
    networks:
      - ews_network
    depends_on:
      - postgres
      - mqtt-broker
      - laravel_app
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # API Gateway (Kong)
  # ==========================================
  kong:
    image: kong:3.6
    container_name: kong-gateway
    env_file:
      - ./backend/.env   # Supaya KONG_RASPI_API_KEY terbaca
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
      KONG_LOG_LEVEL: warn
      # KONG_RASPI_API_KEY sudah di-pass via env_file: ./backend/.env
    ports:
      - "127.0.0.1:8080:8000"   # ✅ Hanya dari host proxy (Caddy/Nginx SSL)
      - "127.0.0.1:8001:8001"  # admin API — hanya localhost!
    volumes:
      - ./kong-gateway/kong.yml:/kong/declarative/kong.yml
    restart: unless-stopped
    networks:
      - ews_network
    depends_on:
      - nginx
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # Frontend Application (Next.js)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://makesens.my.id
        - NEXT_PUBLIC_MQTT_URL=wss://makesens.my.id/mqtt
    container_name: ews_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # ✅ Hanya dari host proxy (Caddy/Nginx SSL)
    networks:
      - ews_network
    depends_on:
      - kong
    security_opt:
      - no-new-privileges:true

volumes:
  mosquitto_data:
  mosquitto_log:
  postgres_data:

networks:
  ews_network:
    driver: bridge
