services:
  # ==========================================
  # API Gateway (Kong)
  # Mengarahkan request dari port 8000 ke Laravel
  # yang jalan di host (php artisan serve --port=8002).
  # ==========================================
  kong:
    image: kong:3.6
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info
    ports:
      - "8000:8000"  # gateway publik (FE & client masuk sini)
      - "8001:8001"  # admin API
    volumes:
      - ./kong-gateway/kong.yml:/kong/declarative/kong.yml
    # Supaya kontainer bisa akses service di host (Laravel di port 8002)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - ews_network

  # ==========================================
  # MQTT Broker (Eclipse Mosquitto)
  # Diakses dari host via 127.0.0.1:1883 / :9001
  # ==========================================
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: ews_mqtt_broker
    restart: unless-stopped
    ports:
      - "1883:1883" # Standar MQTT
      - "9001:9001" # WebSocket untuk Dashboard Next.js
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - ews_network

  # ==========================================
  # Database (PostgreSQL)
  # Diakses dari host via 127.0.0.1:5432
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: ews_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: makesens_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ews_network

  # ==========================================
  # CATATAN: Laravel & Next.js TIDAK lagi di Docker.
  # Jalankan manual di terminal host (Laragon/Windows):
  #   1. cd makesens-laravel        && php artisan serve --port=8002
  #   2. cd makesens-laravel        && php artisan mqtt:listen
  #   3. cd makesens-laravel/frontend && npm run dev
  # ==========================================

volumes:
  mosquitto_data:
  mosquitto_log:
  postgres_data:

networks:
  ews_network:
    driver: bridge
