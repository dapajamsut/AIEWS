server {
    listen 80;
    root /var/www/public;

    index index.php index.html;

    # ✅ Sembunyikan versi Nginx dari response header
    server_tokens off;

    # ✅ Hanya terima request dari Kong API Gateway
    # Kong dikonfigurasi menambahkan header X-Kong-Proxy: true via response-transformer.
    # Request tanpa header ini (misal langsung ke port Nginx) akan ditolak 403.
    set $is_from_kong $http_x_kong_proxy;
    if ($is_from_kong != "true") {
        return 403 "Direct access not allowed. Use API Gateway.";
    }

    # Security headers tambahan di layer Nginx
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass laravel_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Tolak akses ke file sensitif
    location ~ /\. {
        deny all;
    }

    location ~ \.(env|log|sql|sh)$ {
        deny all;
    }
}
