# Konfigurasi Persistence (agar pesan tidak hilang saat restart)
persistence true
persistence_location /mosquitto/data/

# Konfigurasi Log
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log

# ============================================================
# 🔐 KEAMANAN — Autentikasi & ACL
# allow_anonymous true: PHP MQTT client (Laravel) connect tanpa credentials.
# ACL file membatasi siapa bisa publish/subscribe ke topic mana.
# ============================================================
allow_anonymous true

# File ACL — batasi akses topic per client/user
acl_file /mosquitto/config/mosquitto.acl

# File password (untuk client yang mau pakai auth — opsional)
password_file /mosquitto/config/mosquitto.passwd

# ==========================================
# Listener 1: MQTT Standar (Port 1883)
# Digunakan oleh: dummy_sensor.py, ESP32, dan Backend Laravel
# ==========================================
listener 1883 0.0.0.0

# ==========================================
# Listener 2: WebSockets (Port 9001)
# Digunakan oleh: Frontend Dashboard (Next.js/React) agar bisa subscribe real-time
# ==========================================
listener 9001 0.0.0.0
protocol websockets

# ============================================================
# Batasan koneksi (anti-abuse)
# ============================================================
max_connections 100
max_inflight_messages 20
max_queued_messages 100
message_size_limit 65536
