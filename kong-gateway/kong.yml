_format_version: "3.0"

services:
  - name: laravel-api
    url: http://nginx
    routes:
      # 🔐 POST SENSOR (PAKAI API KEY — dari Raspberry Pi)
      - name: sensors-secure
        paths:
          - /api/sensors
        methods:
          - POST
        strip_path: false
        plugins:
          - name: key-auth

      # 🌐 GET SENSOR (PUBLIC — untuk widget / dashboard publik)
      - name: sensors-public
        paths:
          - /api/sensors/latest
        methods:
          - GET
        strip_path: false

      # 🌐 DATA PUBLIK — cuaca & wilayah
      - name: api-public-data
        paths:
          - /api/weather
          - /api/regions
        methods:
          - GET
        strip_path: false

      # 🔐 AUTH ENDPOINTS — rate limit ketat (anti brute-force)
      - name: api-login-route
        paths:
          - /api/login
          - /api/citizen/login
          - /api/citizen/forgot-password
          - /api/citizen/reset-password
          - /api/citizen/register
          - /api/citizen/verify-registration
          - /api/citizen/resend-registration-otp
        methods:
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              policy: local
              error_message: "Terlalu banyak percobaan. Coba lagi dalam 1 menit."

      # 📝 FORM PENDAFTARAN AKSES — rate limit sedang
      - name: api-access-request
        paths:
          - /api/access-requests
        methods:
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 5
              policy: local
              error_message: "Terlalu banyak permintaan. Coba lagi dalam 1 menit."

      # 🔐 ADMIN ROUTES — semua route admin (auth ditangani Laravel Sanctum)
      # Rate limit lebih ketat dari global untuk mencegah scraping
      - name: api-admin-logs
        paths:
          - /api/logs
          - /api/weather-cache
        methods:
          - GET
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 60
              policy: local

      - name: api-admin-thresholds
        paths:
          - /api/thresholds
        methods:
          - GET
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: local

      - name: api-admin-camera
        paths:
          - /api/camera
        methods:
          - GET
          - POST
          - DELETE
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 60
              policy: local

      - name: api-admin-ai
        paths:
          - /api/ai-prediction
        methods:
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 20
              policy: local

      # 🌐 API UMUM (user, citizen, dll) — auth ditangani Laravel Sanctum
      - name: api-route
        paths:
          - /api
        strip_path: false

      # 🌐 ADMIN WEB PAGES — halaman verifikasi access request (dari link email)
      # Dulu langsung ke port 8002, sekarang lewat Kong → Nginx internal
      - name: admin-web-route
        paths:
          - /admin
        methods:
          - GET
          - POST
        strip_path: false

  - name: camera-service
    url: http://cctv.makesens.my.id
    routes:
      # 📷 GET SNAPSHOT (PUBLIC)
      - name: snapshot-public
        paths:
          - /snapshot
        methods:
          - GET
        strip_path: false

plugins:
  # 🔐 Tandai semua request yang lewat Kong ke upstream (Nginx cek header ini)
  # Nginx akan tolak request tanpa header ini → Double-layer protection
  - name: request-transformer
    config:
      add:
        headers:
          - "X-Kong-Proxy: true"

  # 🔐 Security Headers (ditambahkan ke response balik ke client)
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Gateway: KONG"
          - "X-Content-Type-Options: nosniff"
          - "X-Frame-Options: DENY"
          - "X-XSS-Protection: 1; mode=block"
          - "Strict-Transport-Security: max-age=31536000; includeSubDomains"
          - "Referrer-Policy: strict-origin-when-cross-origin"

  # 🌐 CORS — hanya izinkan domain resmi
  - name: cors
    config:
      origins:
        - https://makesens.my.id
      methods:
        - GET
        - POST
        - PATCH
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Requested-With
      credentials: true
      max_age: 3600

  # 🚦 Global Rate Limiting (fallback untuk semua route)
  - name: rate-limiting
    config:
      minute: 120
      policy: local

  # 📦 Request Size Limiting
  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes

  # 🤖 Bot Detection
  - name: bot-detection

consumers:
  - username: raspi
    keyauth_credentials:
      # Kong 3.x declarative config menggunakan ${{VAR}} (double brace) untuk env substitution.
      # Single brace ${VAR} akan dibaca LITERAL (bukan diganti nilai env).
      # Gunakan nilai langsung di sini, dan pastikan file ini tidak di-expose publik.
      - key: "pikel2"