_format_version: "3.0"

services:
  - name: laravel-api
    # Laravel jalan di host (php artisan serve --port=8002).
    # Kong di kontainer akses host lewat host.docker.internal
    # (sudah di-mapping via extra_hosts di docker-compose.yml).
    url: http://host.docker.internal:8002

    routes:
      # 🔐 POST SENSOR (PAKAI API KEY)
      - name: sensors-secure
        paths:
          - /api/sensors
        methods:
          - POST
        strip_path: false
        plugins:
          - name: key-auth

      # 🌐 GET SENSOR (PUBLIC)
      - name: sensors-public
        paths:
          - /api/sensors/latest
        methods:
          - GET
        strip_path: false

      # 🌐 API LAIN (LOGIN DLL)
      - name: api-route
        paths:
          - /api
        strip_path: false

  - name: camera-service
    url: http://cctv.makesens.my.id
    routes:
      # 📷 GET SNAPSHOT (PUBLIC)
      - name: snapshot-public
        paths:
          - /snapshot
        methods:
          - GET
        strip_path: false

plugins:
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Gateway: KONG"

  - name: rate-limiting
    config:
      minute: 120
      policy: local

  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes

consumers:
  - username: raspi
    keyauth_credentials:
      - key: "pikel2"